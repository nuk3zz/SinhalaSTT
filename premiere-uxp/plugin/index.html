<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <div class="title">SinhalaSTT</div>
        <div id="helper-status" class="pill pill-off">Helper: checking…</div>
      </header>

      <!-- Tool 1: Audio clip -> timed text blocks -->
      <section class="card">
        <div class="card-title">Audio clip → text blocks</div>
        <p class="hint">
          Select an audio clip in the timeline, then read it and lay timed text
          blocks onto the sequence.
        </p>

        <div id="clip-info" class="readout">No clip read yet.</div>

        <div class="row">
          <label>Split</label>
          <select id="mode">
            <option value="sentence">Sentences</option>
            <option value="1">1 word</option>
            <option value="2">2 words</option>
            <option value="3">3 words</option>
          </select>
          <button id="read-clip">Read selected clip</button>
        </div>

        <div class="row">
          <button id="get-timing" disabled>Get timing from audio</button>
          <button id="add-blocks" class="primary" disabled>Add text blocks to timeline</button>
        </div>

        <textarea id="script" rows="4" placeholder="Optional: paste your script. Each split line fills one block. Leave empty for blank blocks."></textarea>
        <label class="check"><input type="checkbox" id="use-ai" /> Use AI Caption instead of timing-only (needs Gemini key)</label>
        <input id="api-key" type="password" placeholder="Gemini API key (only for AI)" />
      </section>

      <!-- Tool 2: Offline FM/DL conversion -->
      <section class="card">
        <div class="card-title">Sinhala → FM/DL legacy text</div>
        <p class="hint">Convert Sinhala Unicode to FM/DL legacy-font text (offline).</p>
        <textarea id="fm-in" rows="3" placeholder="Paste Sinhala Unicode here"></textarea>
        <div class="row">
          <button id="convert-fm">Convert</button>
          <button id="copy-fm" disabled>Copy result</button>
        </div>
        <textarea id="fm-out" rows="3" readonly placeholder="FM/DL text appears here"></textarea>
      </section>

      <div id="log" class="log"></div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
